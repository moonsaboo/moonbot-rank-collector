name: 문봇 블로그 방문자 수집

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Firebase 서비스 계정 키 생성
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json
          python -c "
          import json, sys
          try:
              data = json.load(open('serviceAccountKey.json'))
              print('project_id:', data.get('project_id'))
              print('키 파일 정상 생성됨')
          except Exception as e:
              print('키 파일 오류:', e)
              print('파일 크기:', __import__('os').path.getsize('serviceAccountKey.json'))
              sys.exit(1)
          "

      - name: 블로그 데이터 수집 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py
